---
name: 'Pipeline - Dependabot Auto Merge'

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  automerge:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Dependabot Auto Merge
        uses: fastify/github-action-merge-dependabot@4ed43935e3bd362966dfb1e0829f9a35638fe6eb
