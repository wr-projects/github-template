name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '⭐ Features'
    collapse-after: 10
    label: '⭐ feature'
  - title: '🚑 Hotfix'
    collapse-after: 10
    label: 'hotfix'
  - title: '🐛 Bug Fixes'
    collapse-after: 10
    label: '🐛 bug'
  - title: '📚 Documentation'
    collapse-after: 3
    label: '📚 docs'
  - title: '⬆️ Dependency Updates'
    collapse-after: 3
    labels:
      - '🎉 ext-dependency'
      - '🎉 dependencies'
  - title: '🧰 Maintenance'
    collapse-after: 3
    label: 'wip'
exclude-labels:
  - 'skip-changelog'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
template: |
  ## What's Changed

  $CHANGES
